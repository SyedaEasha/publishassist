{{ define "main" }}
<section class="section">
  <div class="container single-page">
    <div class="section-heading">
      <p class="section-label">Service Details</p>
      <h1>{{ .Title }}</h1>
      {{ with .Params.description }}
        <p>{{ . }}</p>
      {{ end }}
    </div>

    <div class="card single-content">
      {{ .Content }}
    </div>
  </div>
</section>
{{ end }}
